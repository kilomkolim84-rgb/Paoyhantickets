name: Compilar App Paoyang Tickets

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  compilar:
    name: Generar APK
    runs-on: ubuntu-latest

    steps:
      - name: Obtener archivos del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Descargar y configurar Gradle automáticamente
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2' # ✅ MISMA VERSIÓN QUE TU PROYECTO
          cache-write-only: false

      - name: Compilar la aplicación
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Guardar el APK listo
        uses: actions/upload-artifact@v4
        with:
          name: Paoyang-Tickets-APK
          path: app/build/outputs/apk/debug/app-debug.apk
