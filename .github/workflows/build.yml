name: Compilar App Paoyang Tickets

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  compilar:
    name: Generar APK
    runs-on: ubuntu-latest

    steps:
      - name: Obtener archivos
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle 8.2 exacto
        run: |
          wget https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export PATH=$PATH:$(pwd)/gradle-8.2/bin
          gradle --version

      - name: Compilar APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: Paoyang-Tickets-APK
          path: app/build/outputs/apk/debug/app-debug.apk
